# Configuración de Alembic para Food Store.
# La URL de la base NO se hardcodea acá: se inyecta en alembic/env.py a partir
# de app.core.config.settings (que lee el .env).

[alembic]
script_location = alembic
prepend_sys_path = .
# (sqlalchemy.url se setea en env.py desde settings.DATABASE_URL)

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
